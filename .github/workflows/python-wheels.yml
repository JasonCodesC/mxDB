name: Python Wheels

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: python -m pip install --upgrade pip cibuildwheel==2.21.3

      - name: Prime cibuildwheel virtualenv cache
        run: |
          python - <<'PY'
          import pathlib
          import re
          import time
          import urllib.request

          import cibuildwheel.util as util

          cache_dir = pathlib.Path(util.CIBW_CACHE_PATH)
          cache_dir.mkdir(parents=True, exist_ok=True)

          source = pathlib.Path(util.__file__).read_text(encoding="utf-8")
          match = re.search(r"virtualenv-(\d+\.\d+\.\d+)\.pyz", source)
          version = match.group(1) if match else "20.26.6"

          target = cache_dir / f"virtualenv-{version}.pyz"
          if target.exists():
              print(f"virtualenv cache already present: {target}")
              raise SystemExit(0)

          url = "https://bootstrap.pypa.io/virtualenv.pyz"
          last_error = None
          for attempt in range(1, 6):
              try:
                  print(f"download attempt {attempt}: {url}")
                  with urllib.request.urlopen(url, timeout=120) as response:
                      target.write_bytes(response.read())
                  print(f"cached virtualenv at {target}")
                  raise SystemExit(0)
              except Exception as exc:  # noqa: BLE001
                  last_error = exc
                  print(f"attempt {attempt} failed: {exc}")
                  time.sleep(10 * attempt)

          raise SystemExit(f"failed to prime virtualenv cache: {last_error}")
          PY

      - name: Cache cibuildwheel assets
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/cibuildwheel
            ~/Library/Caches/cibuildwheel
            ~\AppData\Local\pypa\cibuildwheel\Cache
          key: ${{ runner.os }}-cibw-2.21.3-${{ hashFiles('.github/workflows/python-wheels.yml') }}

      - name: Build wheels
        env:
          CIBW_BUILD: "cp310-* cp311-* cp312-*"
          CIBW_SKIP: "*-musllinux_* pp* *-win32"
          CIBW_ARCHS: "auto64"
          CIBW_BEFORE_BUILD: "python -m pip install --upgrade pip cmake && python {package}/scripts/build_featurectl_for_wheel.py"
          CIBW_BUILD_VERBOSITY: "2"
          CIBW_BEFORE_ALL_LINUX: "yum install -y sqlite-devel || true"
          CIBW_TEST_COMMAND: "python -c \"from mxdb._binary import resolve_featurectl_binary; p=resolve_featurectl_binary(); print(p)\""
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 120
          max_attempts: 3
          retry_wait_seconds: 30
          command: python -m cibuildwheel --output-dir wheelhouse sdk/python

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl

  build_sdist:
    name: Build sdist
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build source distribution
        run: |
          python -m pip install --upgrade pip build
          cd sdk/python
          python -m build --sdist

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: sdk/python/dist/*.tar.gz

  publish_pypi:
    name: Publish to PyPI
    needs: [build_wheels, build_sdist]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      id-token: write

    steps:
      - name: Download wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - name: Download sdist artifact
        uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist

      - name: Publish distribution to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
